theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "default"

repository: "vayneeS/vayneeS.github.io"
---
layout: single
title: ""
---

include:
  - _pages

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

# Your site info
title: Vaynee Sungeelee
description: Data Scientist & HCI Researcher
url: "https://vayneeS.github.io"
baseurl: ""

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

atom_feeds: false
feed:
  disable: true

# Remove follow buttons entirely
author:
  name: "Vaynee Sungeelee"
  links: []
  bio: "Behavioral Researcher + Data Scientist"
  location: "Paris, France"
  avatar: "/assets/images/profile.png"

navigation: main
