theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "default"

repository: "vayneeS/vayneeS.github.io"

title: Vaynee Sungeelee
description: HCI Researcher & Data Scientist
url: "https://vaynees.github.io"
baseurl: ""

locale: "en-US"
name: "Vaynee Sungeelee"

include:
  - _pages

plugins:
  - jekyll-include-cache

author:
  name: "Vaynee Sungeelee"
  bio: "Behavioral Researcher + Data Scientist"
  location: "Paris, France"
  avatar: "/assets/images/profile.png"
  links: []

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: false
      show_date: false
      read_time: false
      share: false
      related: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: false
